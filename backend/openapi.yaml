        account:
          type: string
        password:
          type: string
          writeOnly: true
      required:
      - account
      - password
    FullProfileRequest:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/UserUpdate'
        profile:
          $ref: '#/components/schemas/UserProfile'
        health_condition:
          $ref: '#/components/schemas/UserHealthCondition'
    FullProfileResponseData:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/UserProfile'
        health_condition:
          $ref: '#/components/schemas/UserHealthCondition'
      required:
      - account
      - health_condition
      - profile
    GoalTypeEnum:
      enum:
      - weight_loss
      - muscle_gain
      - blood_sugar_control
      - fat_control
      - protein_up
      - diet_balance
      type: string
      description: |-
        * `weight_loss` - Weight Loss
        * `muscle_gain` - Muscle Gain
        * `blood_sugar_control` - Blood Sugar Control
        * `fat_control` - Fat Control
        * `protein_up` - Protein Up
        * `diet_balance` - Diet Balance
    HealthCheckData:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    HealthCheckResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/HealthCheckData'
      required:
      - code
      - data
      - message
    HealthGoal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        goal_type:
          $ref: '#/components/schemas/GoalTypeEnum'
        target_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
        current_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        target_date:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/HealthGoalStatusEnum'
        description:
          type: string
        progress_records:
          type: array
          items:
            $ref: '#/components/schemas/HealthGoalProgress'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - goal_type
      - id
      - progress_records
      - updated_at
    HealthGoalProgress:
      type: object
      properties:
        id:
