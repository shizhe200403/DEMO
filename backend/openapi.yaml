components:
  schemas:
    AuditStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `rejected` - Rejected
    BehaviorTypeEnum:
      enum:
      - view
      - stay
      - click
      - favorite
      - rate
      - share
      - ignore
      type: string
      description: |-
        * `view` - View
        * `stay` - Stay
        * `click` - Click
        * `favorite` - Favorite
        * `rate` - Rate
        * `share` - Share
        * `ignore` - Ignore
    ContentReport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        target_type:
          type: string
          maxLength: 32
        target_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        reason:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/ContentReportStatusEnum'
          readOnly: true
        processed_by:
          type: integer
          readOnly: true
          nullable: true
        processed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - processed_at
      - processed_by
      - reason
      - status
    ContentReportStatusEnum:
      enum:
      - pending
      - processed
      - rejected
      type: string
      description: |-
        * `pending` - Pending
        * `processed` - Processed
        * `rejected` - Rejected
    EnvelopeExplainRecommendation:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/ExplainRecommendationData'
      required:
      - code
      - data
      - message
    EnvelopeFullProfile:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/FullProfileResponseData'
      required:
      - code
      - data
      - message
    EnvelopeHealthCondition:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserHealthCondition'
      required:
      - code
      - data
      - message
    EnvelopeLogin:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/LoginResponseData'
      required:
      - code
      - data
      - message
    EnvelopeNutritionAnalysis:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/NutritionAnalysis'
      required:
      - code
      - data
      - message
    EnvelopeProfile:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserProfile'
      required:
      - code
      - data
      - message
    EnvelopeRecipeNutrition:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          $ref: '#/components/schemas/RecipeNutritionResult'
      required:
      - code
      - data
      - message
    EnvelopeRecommendationList:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'
      required:
      - code
      - data
      - message
    EnvelopeReportPayload:
      type: object
      properties:
        code:
          type: integer
        message:
