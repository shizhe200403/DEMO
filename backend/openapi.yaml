      - recipe_id
      - score
      - title
    ExportReportRequest:
      type: object
      properties:
        report_type:
          $ref: '#/components/schemas/ReportTypeEnum'
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
    ExternalProxyEnvelope:
      type: object
