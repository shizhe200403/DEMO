          $ref: '#/components/schemas/BehaviorTypeEnum'
        behavior_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          nullable: true
        context_scene:
          type: string
          maxLength: 64
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - behavior_type
      - created_at
      - id
